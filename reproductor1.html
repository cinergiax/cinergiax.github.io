<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Señal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .loader-spin { border: 2px solid rgba(34, 197, 94, 0.1); border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; border-bottom-color: #22c55e; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99; transition: opacity 0.5s; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader-spin mb-3"></div>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Sincronizando <span class="text-green-500">Señal</span></p>
    </div>

    <script>
        function getParameterByName(name) {
            var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
                results = regex.exec(location.search);
            return results === null ? "" : decodeURIComponent(results[1]);
        }

        var streamUrl = getParameterByName("stream");

        if (streamUrl) {
            try {
                // ESTE IFRAME INTERNO NO LLEVA ATRIBUTO SANDBOX DIRECTO
                // Sirve para saltarse la detección anti-sandbox de los streams clonados
                document.write(
                    '<iframe id="video" src="' + streamUrl + '" ' +
                    'allow="autoplay; fullscreen" referrerpolicy="no-referrer" allowfullscreen="true">' +
                    '</iframe>'
                );
                
                // Animación de salida del Loader
                setTimeout(function() {
                    var loader = document.getElementById('loading');
                    if(loader) {
                        loader.style.opacity = '0';
                        setTimeout(function() { loader.style.display = 'none'; }, 500);
                    }
                }, 3000);
            } catch (e) {
                document.write('<div style="color:red;text-align:center;padding-top:20px;">Error de señal</div>');
            }
        } else {
            document.write('<div style="color:gray;text-align:center;padding-top:20px;">Esperando transmisión...</div>');
        }
    </script>
</body>
</html>
