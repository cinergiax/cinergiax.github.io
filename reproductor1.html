<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="robots" content="nofollow, noindex">
    <title>Transmisión En Vivo - FutbolGratis</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #090d16; color: #f8fafc; }
        .iframe-container { position: relative; width: 100%; padding-top: 60%; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- HEADER ESTILO PELOTA LIBRE / FUTBOLGRATIS -->
    <header class="h-14 bg-slate-950 border-b border-slate-800/80 flex items-center justify-between px-4 sticky top-0 z-50">
        <a href="https://futbolgratistv.com/" class="font-black text-lg tracking-tight text-white hover:text-cyan-400 transition-colors">
            FUTBOL<span class="text-cyan-400 ml-0.5">GRATIS</span>
        </a>
        <div class="flex items-center gap-1.5 bg-red-500/10 px-2.5 py-1 rounded-full border border-red-500/20">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            <span class="text-[9px] font-black tracking-wider uppercase leading-none text-red-400">Premium HD</span>
        </div>
    </header>

    <!-- CONTAINER PRINCIPAL -->
    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-6 flex flex-col justify-start">
        <div class="text-center mb-4">
            <h1 class="text-sm md:text-base font-bold text-slate-300 tracking-tight uppercase">
                ⚽ Reproductor Protegido <span class="text-cyan-400">Opción 1</span>
            </h1>
        </div>
        
        <!-- CUADRO DE VIDEO -->
        <div class="w-full bg-slate-950 border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
            <div class="iframe-container">
                <script>
                    function getParameterByName(name) {
                        var regex = new RegExp("[\\?&]" + name + "=([^&#]*)"),
                            results = regex.exec(location.search);
                        return results === null ? "" : decodeURIComponent(results[1]);
                    }
                    var streamUrl = getParameterByName("stream");
                    if (streamUrl) {
                        document.write(
                            '<iframe id="embedIframe" src="' + streamUrl + '" ' +
                            'sandbox="allow-same-origin allow-scripts allow-presentation allow-forms" ' +
                            'allowfullscreen="true" scrolling="no" allow="autoplay; fullscreen; encrypted-media"></iframe>'
                        );
                    } else {
                        document.write('<div class="absolute inset-0 flex items-center justify-center text-xs text-slate-500 font-bold uppercase">Esperando transmisión...</div>');
                    }
                </script>
            </div>
            
            <!-- BOTÓN DE RECARGA -->
            <div class="p-3 bg-slate-950 border-t border-slate-800/60 flex justify-center">
                <button onclick="location.reload();" class="bg-cyan-500 hover:bg-cyan-400 text-black font-black text-[11px] tracking-wider uppercase px-5 py-2 rounded-lg transition-transform active:scale-95 shadow-lg shadow-cyan-500/20">
                    🔄 Recargar Señal
                </button>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-slate-950 border-t border-slate-900 py-4 px-4 flex flex-col sm:flex-row items-center justify-between gap-2">
        <span class="text-[11px] text-slate-500 font-medium">FutbolGratis TV 2026 © Todos los derechos reservados.</span>
        <ul class="flex items-center gap-4 text-[11px] font-bold text-slate-400">
            <li><a href="https://t.me/FutbolGratis_Tv" target="_blank" class="hover:text-cyan-400 transition-colors">Telegram</a></li>
            <li><a href="#" class="hover:text-cyan-400 transition-colors">DMCA</a></li>
        </ul>
    </footer>

</body>
</html>
