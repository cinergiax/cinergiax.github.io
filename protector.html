<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protector de Señal</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        iframe { width: 100% !important; height: 100% !important; border: none; }
    </style>
</head>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stream = urlParams.get('stream');

        if (stream) {
            const visorUrl = "https://futbolgratistv.com/reproductor1.html"; 
            const finalUrl = visorUrl + "?stream=" + encodeURIComponent(stream);

            // Se agregaron permisos clave en el sandbox para evitar el colapso de la señal
            document.write(
                '<iframe src="' + finalUrl + '" ' +
                ' allow-scripts allow-presentation allow-forms allow-top-navigation-by-user-activation allow-modals" ' +
                'allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" allow="autoplay; fullscreen"></iframe>'
            );
        } else {
            document.write('<div style="color:white;text-align:center;padding-top:20px;font-family:sans-serif;">Esperando señal...</div>');
        }
    </script>
</body>
</html>
